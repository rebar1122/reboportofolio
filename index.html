<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio professionale di RZ — model, barber e photographer. Collaborazioni creative, immagine personale e visual identity." />
  <meta name="theme-color" content="#0b0b0c" />
  <title>RZ — Portfolio Professionale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080809;
      --bg-soft: #101113;
      --panel: rgba(255,255,255,0.05);
      --panel-strong: rgba(255,255,255,0.08);
      --text: #f5f1ea;
      --muted: rgba(245,241,234,0.72);
      --muted-soft: rgba(245,241,234,0.46);
      --line: rgba(255,255,255,0.10);
      --accent: #d8b78b;
      --accent-strong: #e6c79d;
      --radius: 26px;
      --radius-lg: 34px;
      --shadow: 0 25px 80px rgba(0,0,0,0.40);
      --max: 1220px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(216,183,139,0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(255,255,255,0.04), transparent 22%),
        linear-gradient(180deg, #060607 0%, #0a0b0c 45%, #070708 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: 0.08;
      pointer-events: none;
      z-index: -2;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; width: 100%; }
    .container { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; }

    .progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      box-shadow: 0 0 24px rgba(230,199,157,0.6);
      z-index: 1200;
    }

    .navbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1160px, calc(100% - 24px));
      z-index: 1100;
      backdrop-filter: blur(18px);
      background: rgba(8,8,9,0.55);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(216,183,139,0.35);
      color: var(--accent);
      background: rgba(255,255,255,0.03);
      font-weight: 800;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav-links a:hover { color: #fff; }

    .nav-cta {
      padding: 11px 18px;
      border-radius: 999px;
      background: var(--text);
      color: #0a0a0a;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .nav-cta:hover { background: var(--accent-strong); transform: translateY(-1px); }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: end;
      padding: 120px 0 56px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://i.postimg.cc/QC4v8XsJ/Full-Size-Render.jpg');
      background-size: cover;
      background-position: center;
      transform: scale(1.04);
      opacity: 0.48;
      will-change: transform;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(7,7,8,0.24) 0%, rgba(7,7,8,0.56) 48%, rgba(7,7,8,0.95) 100%),
        radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.36) 100%);
      z-index: 1;
    }

    .hero-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: end;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(4.6rem, 12vw, 9rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
      max-width: 760px;
    }

    .hero-copy {
      font-size: clamp(1.04rem, 1.9vw, 1.2rem);
      line-height: 1.9;
      color: rgba(255,255,255,0.78);
      max-width: 650px;
      margin: 22px 0 0;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .btn, .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 24px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease;
    }

    .btn {
      background: var(--text);
      color: #0a0a0a;
    }

    .btn:hover { background: var(--accent-strong); transform: translateY(-2px); }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.04);
      color: #fff;
    }

    .btn-secondary:hover { border-color: rgba(216,183,139,0.45); transform: translateY(-2px); }

    .hero-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-lg);
      padding: 26px;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      justify-self: end;
      width: 100%;
      max-width: 380px;
    }

    .hero-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .hero-card strong {
      display: block;
      font-size: 1.4rem;
      color: #fff;
      margin-bottom: 8px;
    }

    .hero-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 22px;
    }

    .stat {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .stat strong {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: #fff;
    }

      color: var(--muted-soft);
      text-transform:
